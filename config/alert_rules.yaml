alerts:
  - name: high_latency_p95
    severity: P2
    metric: latency_p95_ms
    threshold: 2500
    operator: ">"
    condition: latency_p95_ms > 2500 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    metric: error_rate_pct
    threshold: 5
    operator: ">"
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    metric: avg_cost_usd
    baseline_usd: 0.002
    multiplier: 2
    min_traffic: 3
    operator: ">"
    condition: avg_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
